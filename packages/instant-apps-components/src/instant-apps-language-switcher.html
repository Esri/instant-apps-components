<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
  <title>ArcGIS Instant Apps Components</title>

  <script nomodule src="/build/instant-apps-components.js"></script>
</head>

<body>

            "id": "customURLParams",

          }
        },

      },
      "splashButtonText": {
        "type": "string",

    langSwitcher.appSettings = appSettings;
    langSwitcher.translatedLanguages = Object.keys(appSettings.translatedLanguageLabels);

    const openButton = document.getElementById('openLangSwitcher');
    openButton.addEventListener('click', () => (langSwitcher.open = true));
  </script>
</body>

</html>
